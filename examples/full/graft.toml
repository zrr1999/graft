schema = 1

# Whole-state admission/promotion bindings for examples/full/constraints.roto.
# Each name resolves to a top-level `fn <name>(app: Application) -> Constraint`.

admission.required = [
  "no_generated_artifacts",
  "cargo_fmt_clean",
  "cargo_tests_pass",
]

promotion.required = [
  "safe_patch",
  "cargo_clippy_clean",
  "cargo_doc_tests_pass",
]

[sync]
enabled = true
