name: "CD - Publish"

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

concurrency:
  group: cd-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-wheel:
    name: wheel (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
            artifact: wheel-linux-x86_64
          - label: macos-x86_64
            runner: macos-15-intel
            artifact: wheel-macos-x86_64
          - label: macos-arm64
            runner: macos-14
            artifact: wheel-macos-arm64
          - label: windows-x86_64
            runner: windows-latest
            artifact: wheel-windows-x86_64
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-wheel-${{ matrix.label }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.12.6
          rust-toolchain: "1.95"
          command: build
          manylinux: "2014"
          args: --release --locked --compatibility pypi --out dist

      - name: Smoke-test built wheel
        shell: bash
        run: |
          wheel_path="$(ls dist/*.whl | head -n 1)"
          tmp_dir="$(mktemp -d)"
          uv tool run --from "$wheel_path" graft --help
          uv tool run --from "$wheel_path" graft --cwd "$tmp_dir" init
          test -f "$tmp_dir/graft.toml"
          test -d "$tmp_dir/.graft"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: graftkit-${{ matrix.artifact }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-sdist

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.12.6
          rust-toolchain: "1.95"
          command: sdist
          args: --out dist

      - name: Smoke-test source distribution
        shell: bash
        run: |
          sdist_path="$(ls dist/*.tar.gz | head -n 1)"
          tmp_dir="$(mktemp -d)"
          uv tool run --from "$sdist_path" graft --help
          uv tool run --from "$sdist_path" graft --cwd "$tmp_dir" init
          test -f "$tmp_dir/graft.toml"
          test -d "$tmp_dir/.graft"

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: graftkit-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs:
      - build-wheel
      - build-sdist
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/graftkit
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v6
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: graftkit-*
          path: dist
          merge-multiple: true
      - name: List release artifacts
        run: ls -1 dist
      - name: Publish to PyPI
        run: uv publish dist/*

  github-release:
    name: github-release
    runs-on: ubuntu-latest
    needs:
      - build-wheel
      - build-sdist
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: graftkit-*
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
