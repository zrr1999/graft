[default]
extend-ignore-words-re = ["^[a-zA-Z]{1,3}$"]
extend-ignore-re = [
  "(?Rm)^.*(#|//)\\s*typos:\\s*disable-line$",
  "(?s)(#|//)\\s*typos:\\s*off.*?\\n\\s*(#|//)\\s*typos:\\s*on",
]

[default.extend-words]
blake3 = "blake3"
gitoxide = "gitoxide"
graft = "graft"
graftkit = "graftkit"
rusqlite = "rusqlite"
safetensors = "safetensors"
serde = "serde"
worktree = "worktree"
worktrees = "worktrees"

[files]
extend-exclude = ["target/", "dist/", ".graft/", ".spark/"]
